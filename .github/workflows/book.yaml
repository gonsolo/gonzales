name: book

on:
  push:
  workflow_dispatch:

env:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Build book (resolve snippets)
        run: python3 docs/build_book.py

      - name: Convert book to HTML
        run: |
          sudo apt-get install -y pandoc
          mkdir -p _site

          for f in docs/book/*.md; do
            base=$(basename "$f" .md)
            pandoc "$f" -s --toc --metadata title="Gonzales Renderer" \
              --css=style.css -o "_site/${base}.html"
          done

          cat > _site/style.css << 'ENDCSS'
          body { max-width: 800px; margin: 2rem auto; padding: 0 1rem;
                 font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
                 line-height: 1.7; color: #c9d1d9; background: #0d1117; }
          h1 { color: #e6edf3; border-bottom: 1px solid #21262d; padding-bottom: 0.3em; }
          h2 { color: #e6edf3; margin-top: 2em; border-bottom: 1px solid #21262d; padding-bottom: 0.3em; }
          h3 { color: #e6edf3; }
          a { color: #58a6ff; text-decoration: none; }
          a:hover { text-decoration: underline; }
          pre { background: #161b22; padding: 1rem; border-radius: 6px;
                overflow-x: auto; border: 1px solid #30363d; }
          code { font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
                 font-size: 0.85em; background: #161b22; padding: 0.2em 0.4em; border-radius: 3px; }
          pre code { background: none; padding: 0; }
          table { border-collapse: collapse; width: 100%; margin: 1em 0; }
          th, td { border: 1px solid #30363d; padding: 0.5rem 0.75rem; text-align: left; }
          th { background: #161b22; font-weight: 600; }
          tr:nth-child(even) { background: #161b22; }
          img { max-width: 100%; }
          nav#TOC { background: #161b22; padding: 1em; border-radius: 6px;
                    margin-bottom: 2em; border: 1px solid #30363d; }
          nav#TOC a { color: #58a6ff; }
          hr { border: none; border-top: 1px solid #21262d; }
          ENDCSS

          echo '<meta http-equiv="refresh" content="0; url=00_index.html">' > _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
